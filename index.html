<meta charset="UTF-8">
<title>다카마쓰런</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --paper:#EFEEE2;
    --paper-raised:#F8F7EF;
    --ink:#24261F;
    --muted:#6B6E5F;
    --line:#D9D6C6;
    --accent:#74803A;
    --accent-ink:#F8F7EF;
    --route-rail:#35508C;
    --route-ferry:#C1652E;
    --radius:10px;
    --serif:"Iowan Old Style","Noto Serif KR","Nanum Myeongjo",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    --mono:ui-monospace,"SFMono-Regular","Menlo","Consolas",monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#1B1F1C;
      --paper-raised:#23271F;
      --ink:#EDEAE0;
      --muted:#9CA08C;
      --line:#34382E;
      --accent:#A3B563;
      --accent-ink:#1B1F1C;
      --route-rail:#6E8FD9;
      --route-ferry:#D2762F;
    }
  }
  :root[data-theme="dark"]{
    --paper:#1B1F1C; --paper-raised:#23271F; --ink:#EDEAE0; --muted:#9CA08C;
    --line:#34382E; --accent:#A3B563; --accent-ink:#1B1F1C;
    --route-rail:#6E8FD9; --route-ferry:#D2762F;
  }
  :root[data-theme="light"]{
    --paper:#EFEEE2; --paper-raised:#F8F7EF; --ink:#24261F; --muted:#6B6E5F;
    --line:#D9D6C6; --accent:#74803A; --accent-ink:#F8F7EF;
    --route-rail:#35508C; --route-ferry:#C1652E;
  }

  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--sans); line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:32px 24px 64px;}

  header{margin-bottom:28px;}
  h1{
    font-family:var(--serif); font-weight:600; font-size:clamp(1.6rem,3vw,2.1rem);
    margin:0 0 6px; letter-spacing:.01em; text-wrap:balance;
  }
  header p{margin:0; color:var(--muted); font-size:.95rem; max-width:62ch;}
  .stay-badge{
    display:inline-flex; align-items:center; gap:6px; margin-top:12px;
    font-family:var(--mono); font-size:.78rem; color:var(--muted);
    border:1px solid var(--line); border-radius:999px; padding:5px 12px;
  }

  .grid{
    display:grid; grid-template-columns:minmax(0,1.35fr) minmax(300px,1fr);
    gap:20px; align-items:start;
  }
  @media (max-width:860px){ .grid{grid-template-columns:1fr;} }

  .panel{
    background:var(--paper-raised); border:1px solid var(--line);
    border-radius:var(--radius); padding:18px;
  }

  .map-panel{padding:14px 14px 10px;}
  .map-legend{
    display:flex; flex-wrap:wrap; gap:16px; padding:2px 6px 12px;
    font-size:.78rem; color:var(--muted);
  }
  .map-legend span{display:inline-flex; align-items:center; gap:6px;}
  .swatch-line{width:20px; height:2px; background:currentColor; display:inline-block;}
  .swatch-line.ferry{
    background:none; border-top:2px dashed currentColor; height:0; width:20px;
  }
  .swatch-line.airport{
    background:none; border-top:2px dotted currentColor; height:0; width:20px;
  }
  .swatch-dot{width:9px; height:9px; border-radius:50%; background:currentColor; display:inline-block;}
  .rail-c{color:var(--route-rail);}
  .ferry-c{color:var(--route-ferry);}
  .hub-c{color:var(--accent);}
  .airport-c{color:var(--muted);}

  #leafletMap{
    width:100%; height:460px; border-radius:8px; overflow:hidden;
    background:var(--line); /* visible placeholder if tiles can't load (e.g. no network) */
  }
  .leaflet-tooltip.stop-label{
    background:var(--paper-raised); color:var(--ink); border:1px solid var(--line);
    font-family:var(--sans); font-size:11.5px; font-weight:600; padding:2px 7px;
    box-shadow:none;
  }
  .leaflet-tooltip.hub-label{
    background:var(--accent); color:var(--accent-ink); border:none;
    font-family:var(--serif); font-weight:700; font-size:12px; padding:3px 9px;
  }

  .disclaimer{font-size:.72rem; color:var(--muted); padding:8px 6px 2px;}
  .airport-route{
    font-size:.78rem; color:var(--muted); padding:10px 6px 2px;
    margin-top:6px; border-top:1px solid var(--line);
  }
  .airport-route .ar-title{
    display:block; font-weight:600; color:var(--ink); font-size:.85rem; margin-bottom:8px;
  }
  .airport-route dl{margin:0; display:grid; grid-template-columns:max-content 1fr; gap:6px 14px;}
  .airport-route dt{color:var(--muted); font-size:.72rem; white-space:nowrap; padding-top:1px;}
  .airport-route dd{margin:0; font-size:.8rem; color:var(--ink); font-family:var(--mono); font-variant-numeric:tabular-nums;}

  .module-list{list-style:none; margin:0 0 14px; padding:0; display:flex; flex-direction:column; gap:6px;}
  .module-list button{
    all:unset; display:flex; align-items:center; gap:10px; cursor:pointer;
    padding:9px 10px; border-radius:8px; width:100%;
  }
  .module-list button:hover{background:var(--paper);}
  .module-list button[aria-pressed="true"]{background:var(--paper); box-shadow:inset 0 0 0 1.5px var(--accent);}
  .module-list button:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .m-dot{width:9px; height:9px; border-radius:50%; flex:none;}
  .m-dot.rail{background:var(--route-rail);}
  .m-dot.ferry{background:var(--route-ferry);}
  .m-name{font-weight:600; font-size:.92rem; flex:1;}
  .m-time{font-family:var(--mono); font-size:.76rem; color:var(--muted); font-variant-numeric:tabular-nums;}

  .detail h2{font-family:var(--serif); font-size:1.25rem; margin:0 0 4px;}
  .detail .def{font-size:.85rem; color:var(--muted); font-style:italic; margin:0 0 10px;}
  .detail .mode-line{font-size:.8rem; color:var(--muted); margin:0 0 14px; display:flex; align-items:center; gap:6px;}
  .detail .total-time{font-family:var(--mono); font-size:.8rem; color:var(--muted); margin:0 0 18px; font-variant-numeric:tabular-nums;}

  .detail h3{font-size:.78rem; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:16px 0 6px; font-weight:600;}
  .detail ul{margin:0; padding-left:18px; font-size:.9rem;}
  .detail li{margin-bottom:3px;}
  .combine-note{font-size:.83rem; color:var(--muted); margin-top:14px; padding-top:12px; border-top:1px solid var(--line);}

  footer{margin-top:24px; font-size:.75rem; color:var(--muted);}
  footer a{color:inherit;}
</style>

<div class="wrap">
  <header>
    <h1>다카마쓰런</h1>
    <p>숙소 기준으로 각 목적지까지 예상 소요시간, 그 모듈에서 물꺼, 볼꺼 확인하는 지도</p>
    <div class="stay-badge">🏠 숙소 — 카타하라마치 근처</div>
  </header>

  <div class="grid">
    <div class="panel map-panel">
      <div class="map-legend">
        <span class="hub-c"><span class="swatch-dot"></span>숙소</span>
        <span class="rail-c"><span class="swatch-line"></span>육상 (철도·버스)</span>
        <span class="ferry-c"><span class="swatch-line ferry"></span>페리</span>
        <span class="airport-c"><span class="swatch-line airport"></span>공항</span>
      </div>
      <div id="leafletMap"></div>
      <div class="airport-route">
        <span class="ar-title">✈️ 다카마쓰공항 ↔ 숙소</span>
        <dl>
          <dt>왕복 이동시간</dt>
          <dd>편도 약 1시간 (리무진버스 또는 전철)</dd>
        </dl>
      </div>
    </div>

    <div>
      <div class="panel" style="margin-bottom:14px;">
        <ul class="module-list" id="moduleList"></ul>
      </div>
      <div class="panel detail" id="detail"></div>
    </div>
  </div>

</div>

<script>
(function(){
  var HUB = {lat:34.346, lng:134.054, label:'숙소'};
  var AIRPORT = {lat:34.215, lng:134.015, label:'다카마쓰공항'};

  var MODULES = [
    {
      id:'A', name:'다카마쓰 시내', mode:'rail',
      def:'숙소 근처 다카마쓰 시내 코스',
      stops:[{lat:34.335, lng:134.040, label:'리쓰린공원'},{lat:34.341, lng:134.049, label:'미나미신마치 상점가'}],
      roundTrip:'30분 이내', roundTripMin:30,
      stayLabel:'마음대로 (관광 1~2시간 + 식사 1시간 기준 추정)', stayMin:180,
      see:['리쓰린공원','다카마쓰 성터','미나미신마치 상점가 등'],
      eat:['안모치 조니','와산본 화과자','호네쓰키도리','올리브 방어','올리브규','사와라','쇼유마메 등'],
      note:'물꺼는 다른 코스 이후 저녁 시간대에 자유롭게 끼워넣기 좋음'
    },
    {
      id:'B', name:'미토요', mode:'rail',
      def:'서쪽 미토요시 포토스팟 코스',
      stops:[{lat:34.176, lng:133.689, label:'지치부가하마'},{lat:34.117, lng:133.617, label:'제니가타 스나에'}],
      roundTrip:'약 4시간 40분', roundTripMin:280,
      stayLabel:'관광 1.5~2시간 + 간식 30분~1시간', stayMin:135,
      see:['지치부가하마 (일몰 시간대 베스트)','제니가타 스나에'],
      eat:['타코반'],
      note:'포토스팟이 유명한데 이동시간에 비해 가치가 상당히 떨어짐'
    },
    {
      id:'C', name:'사카이데·마루가메·젠츠지', mode:'rail',
      def:'서쪽 사카이데시 + 더 남쪽 마루가메·젠츠지까지 묶은 코스',
      stops:[
        {lat:34.354, lng:133.826, label:'세토대교 기념공원'},
        {lat:34.313, lng:133.805, label:'시코쿠 수족관'},
        {lat:34.288, lng:133.803, label:'마루가메성'},
        {lat:34.235, lng:133.792, label:'젠츠지'}
      ],
      roundTrip:'약 2시간 30분~3시간', roundTripMin:165,
      stayLabel:'관광 4~5시간(마루가메성·젠츠지 포함 시) + 식사 1시간, 사카이데만 돌 경우 관광 3~4시간', stayMin:330,
      see:['세토대교 기념공원','시코쿠 수족관','마루가메성','젠츠지 등'],
      eat:['핏피메시','마루가메 현지 우동'],
      note:'사카이데만 치면 크게 멀지 않고 풍경 둘러보기 좋으며 자전거 가능'
    },
    {
      id:'D', name:'고토히라', mode:'rail',
      def:'시코쿠 대표 우동 관광지 코스',
      stops:[{lat:34.187, lng:133.809, label:'고토히라궁'}],
      roundTrip:'약 2시간 10분', roundTripMin:130,
      stayLabel:'우동 1시간 + 고토히라궁 2시간', stayMin:180,
      see:['고토히라궁'],
      eat:['정통 사누키 우동','오뎅(겨자 초된장)'],
      note:'고토히라궁은 제대로 등산할 각오 되어있으면 1368계단, 겁쟁이면 785계단이고 원조 사누키 우동 가능'
    },
    {
      id:'E', name:'쇼도시마', mode:'ferry',
      def:'배타고 들어가는 쇼도시마 섬 코스',
      stops:[
        {lat:34.492, lng:134.176, label:'도쿠노쇼항'},
        {lat:34.479, lng:134.190, label:'엔젤로드'},
        {lat:34.474, lng:134.272, label:'올리브공원'},
        {lat:34.472, lng:134.317, label:'모리쿠니 사케 양조장'}
      ],
      roundTrip:'약 2시간 40분', roundTripMin:160,
      stayLabel:'양조장 1시간 + 점심 1시간 + 올리브공원 1시간 + 엔젤로드(간조 시간대 맞을 때만) 1시간 + 섬 내 이동시간 2~3시간', stayMin:390,
      see:['올리브공원 (그리스풍 풍차)','엔젤로드 (간조 시 도보 가능)','모리쿠니 사케 양조장 (멀어서 시간 봐야 함)'],
      eat:['데노베 소면(올리브오일 반죽)','올리브오일 아이스크림 등'],
      note:'자전거로 최대한 이동 후 페리 선착장까지 버스로 복귀하는 일정을 짜야함'
    },
    {
      id:'F', name:'나오시마', mode:'ferry',
      def:'배타고 들어가는 나오시마 섬 코스',
      stops:[{lat:34.460, lng:133.997, label:'미야노우라항'}],
      roundTrip:'약 2시간 20분', roundTripMin:140,
      stayLabel:'미술관·야외 조형물 관람 3~4시간 (섬 내 이동 포함)', stayMin:210,
      see:['베네세 아트사이트','쿠사마 야요이 호박 조형물','치추미술관 등'],
      eat:['특산물은 딱히 없음'],
      note:'예술 특화 코스라 예술에 관심 없으면 후순위'
    },
    {
      id:'G', name:'야시마', mode:'rail',
      def:'숙소 근거리 야시마 코스',
      stops:[{lat:34.354, lng:134.108, label:'야시마지'},{lat:34.351, lng:134.104, label:'시코쿠무라 민가원'}],
      roundTrip:'30분 이내', roundTripMin:40,
      stayLabel:'관광 2~3시간', stayMin:150,
      see:['야시마지','시코쿠무라 민가원','전망대 등'],
      eat:['다카마쓰와 같음'],
      note:'근거리라 치고 빠지기 좋은 코스'
    },
    {
      id:'H', name:'메기지마·오기지마', mode:'ferry',
      def:'다카마쓰항에서 짧은 페리로 오가는 섬 코스',
      stops:[{lat:34.394, lng:134.050, label:'메기지마섬'},{lat:34.426, lng:134.060, label:'오기지마섬'}],
      roundTrip:'약 1시간 (메기지마 약 20분, 오기지마 약 40분)', roundTripMin:60,
      stayLabel:'관광 3~4시간 (두 섬 다 돌 경우)', stayMin:210,
      see:['메기지마 오니가시마 동굴','오기지마 고양이 섬 골목','세토우치 트리엔날레 상설 예술작품'],
      eat:['특산물은 딱히 없음'],
      note:'긴 일정은 아니지만 페리 배차 간격에 따라 변동 있음'
    }
  ];

  function token(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  var map = null, hubMarker = null, airportLine = null, airportMarker = null;

  function initMap(){
    if (typeof L === 'undefined') return false;
    map = L.map('leafletMap', {scrollWheelZoom:false});

    // Leaflet requires a view before any layer is added, so compute bounds
    // from plain data first and set the view before touching tile/markers.
    var bounds = [[HUB.lat, HUB.lng], [AIRPORT.lat, AIRPORT.lng]];
    MODULES.forEach(function(m){
      m.stops.forEach(function(s){ bounds.push([s.lat, s.lng]); });
    });
    map.fitBounds(bounds, {padding:[36,36]});

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom:18,
      attribution:'&copy; OpenStreetMap contributors'
    }).addTo(map);

    hubMarker = L.circleMarker([HUB.lat, HUB.lng], {
      radius:9, weight:3, color:token('--accent'),
      fillColor:token('--paper-raised'), fillOpacity:1
    }).addTo(map);
    hubMarker.bindTooltip(HUB.label, {permanent:true, direction:'top', className:'hub-label', offset:[0,-6]});

    // Fixed airport route — not a selectable module, always shown as-is.
    airportLine = L.polyline([[HUB.lat, HUB.lng], [AIRPORT.lat, AIRPORT.lng]], {
      color:token('--muted'), weight:2, opacity:.5, dashArray:'2 8'
    }).addTo(map);
    airportMarker = L.circleMarker([AIRPORT.lat, AIRPORT.lng], {
      radius:7, weight:2, color:token('--muted'), fillColor:token('--muted'), fillOpacity:.85
    }).addTo(map);
    airportMarker.bindTooltip(AIRPORT.label, {permanent:true, direction:'top', className:'stop-label', offset:[0,-6]});

    MODULES.forEach(function(m){
      var color = m.mode==='ferry' ? token('--route-ferry') : token('--route-rail');
      var latlngs = [[HUB.lat, HUB.lng]];
      m.stops.forEach(function(s){ latlngs.push([s.lat, s.lng]); });

      var line = L.polyline(latlngs, {
        color:color, weight:2, opacity:.35,
        dashArray: m.mode==='ferry' ? '6 6' : null
      }).addTo(map);

      var markers = m.stops.map(function(s){
        var mk = L.circleMarker([s.lat, s.lng], {
          radius:7, weight:2, color:color, fillColor:color, fillOpacity:.85
        }).addTo(map);
        mk.bindTooltip(s.label, {permanent:true, direction:'top', className:'stop-label', offset:[0,-6]});
        mk.on('click', function(){ select(m.id); });
        return mk;
      });

      m._line = line;
      m._markers = markers;
      m._color = color;
    });

    return true;
  }

  function restyleMapColors(){
    if (!map) return;
    hubMarker.setStyle({color:token('--accent'), fillColor:token('--paper-raised')});
    airportLine.setStyle({color:token('--muted')});
    airportMarker.setStyle({color:token('--muted'), fillColor:token('--muted')});
    MODULES.forEach(function(m){
      var color = m.mode==='ferry' ? token('--route-ferry') : token('--route-rail');
      m._color = color;
      m._line.setStyle({color:color});
      m._markers.forEach(function(mk){ mk.setStyle({color:color, fillColor:color}); });
    });
  }

  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', restyleMapColors);
  new MutationObserver(restyleMapColors).observe(document.documentElement, {attributes:true, attributeFilter:['data-theme']});

  // module list
  var listEl = document.getElementById('moduleList');
  MODULES.forEach(function(m){
    var li = document.createElement('li');
    var btn = document.createElement('button');
    btn.setAttribute('aria-pressed','false');
    btn.setAttribute('data-id', m.id);
    btn.innerHTML =
      '<span class="m-dot '+m.mode+'"></span>' +
      '<span class="m-name">'+m.id+'. '+m.name+'</span>' +
      '<span class="m-time">'+m.roundTrip+'</span>';
    btn.addEventListener('click', function(){ select(m.id); });
    li.appendChild(btn);
    listEl.appendChild(li);
    m._listEl = btn;
  });

  function fmtHM(min){
    var h = Math.floor(min/60), mm = min%60;
    return ((h?h+'시간 ':'') + (mm? mm+'분':'')).trim() || '0분';
  }

  function renderDetail(m){
    var total = m.roundTripMin + m.stayMin;
    var detail = document.getElementById('detail');
    detail.innerHTML =
      '<h2>'+m.id+'. '+m.name+'</h2>' +
      '<p class="def">'+m.def+'</p>' +
      '<p class="mode-line"><span class="m-dot '+m.mode+'" style="display:inline-block;width:8px;height:8px;border-radius:50%;"></span>' +
        (m.mode==='ferry' ? '페리' : '육상 (철도·버스)') + ' · 왕복 ' + m.roundTrip + '</p>' +
      '<p class="total-time">왕복+체류 약 '+fmtHM(total)+'</p>' +
      '<h3>뭘 보는지</h3><ul>'+m.see.map(function(s){return '<li>'+s+'</li>';}).join('')+'</ul>' +
      '<h3>뭘 먹는지</h3><ul>'+m.eat.map(function(s){return '<li>'+s+'</li>';}).join('')+'</ul>' +
      '<p class="combine-note">'+m.note+'</p>';
  }

  var current = null;
  function select(id){
    var m = MODULES.filter(function(x){return x.id===id;})[0];
    if (!m) return;
    current = id;
    MODULES.forEach(function(x){
      var isSel = x.id===id;
      if (x._line){
        x._line.setStyle({opacity:isSel?1:.35, weight:isSel?4:2});
        if (isSel) x._line.bringToFront();
      }
      if (x._markers){
        x._markers.forEach(function(mk){
          mk.setStyle({weight:isSel?3:2, radius:isSel?8:7});
        });
      }
      x._listEl.setAttribute('aria-pressed', isSel ? 'true' : 'false');
    });
    renderDetail(m);
  }

  initMap();
  select('D');
})();
</script>
